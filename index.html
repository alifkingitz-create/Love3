<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:cursive;
  background:linear-gradient(135deg,#ffd6e7,#ffc2d1);
  text-align:center;
  overflow:hidden;
}

/* pages */
.page{ display:none; }
.active{ display:block; }

/* card */
.card{
  background:#ffe6f0;
  margin:20px;
  padding:25px;
  border-radius:20px;
  box-shadow:0 0 20px rgba(255,105,180,0.4);
}

/* button */
button{
  padding:12px 18px;
  border:none;
  border-radius:20px;
  background:linear-gradient(45deg,#ff4d88,#ff80b3);
  color:white;
  margin:10px;
}

/* doll */
.doll{
  font-size:55px;
  animation:bounce 1s infinite;
}
@keyframes bounce{ 50%{transform:translateY(-12px);} }

/* LETTER GRID */
.letters{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:12px;
}

/* 💌 LETTER */
.letter{
  width:140px;
  height:100px;
  background:#ff99cc;
  border-radius:10px;
  position:relative;
  overflow:hidden;
}

/* flap */
.letter::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  border-left:70px solid transparent;
  border-right:70px solid transparent;
  border-top:50px solid #ff66a3;
  transform-origin:top;
  transition:0.6s;
}

/* paper */
.paper{
  position:absolute;
  width:90%;
  height:90%;
  background:white;
  top:5%;
  left:5%;
  border-radius:8px;
  display:flex;
  justify-content:center;
  align-items:center;
  transform:translateY(100%);
  transition:0.6s;
}

/* photo */
.paper img{
  width:100%;
  border-radius:8px;
}

/* open */
.letter.open::before{
  transform:rotateX(180deg);
}
.letter.open .paper{
  transform:translateY(0);
}

/* popup */
.popup{
  display:none;
  position:fixed;
  top:10%;
  left:5%;
  width:90%;
  background:white;
  padding:15px;
  border-radius:15px;
}

.popup img{ width:90%; }
.popup img{
  width:90%;
  max-width:250px;
  border-radius:12px;
  display:block;
  margin:auto;
}
#line{
  color:#ff4d88;
  font-weight:bold;
}

/* flower */
.flowers span{
  position:fixed;
  top:-10px;
  animation:fall linear infinite;
}
@keyframes fall{ to{transform:translateY(100vh);} }
</style>

</head>

<body>

<audio id="music" loop>
  <source src="music.mp3">
</audio>

<!-- PAGE 1 -->
<div id="page1" class="page active">
  <div class="card">
    <h2>I made something for you 💖</h2>
    <div class="doll">🐱</div>
    <button onclick="start()">What?</button>
  </div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
  <div class="card">
    <h2>Will you see it? 🥺</h2>
    <div class="doll">🐻🐼</div>
    <button onclick="show('letters')">Yes</button>
    <button onclick="show('no')">No</button>
  </div>
</div>

<!-- NO -->
<div id="no" class="page">
  <div class="card">
    <h2>Why no 😒</h2>
    <button onclick="show('page2')">Try Again</button>
  </div>
</div>

<!-- LETTERS -->
<div id="letters" class="page">
  <h2>Open Koro 🙈</h2>

  <div class="letters">

    <div class="letter" onclick="openLetter(this,1)">
      <div class="paper">😽</div>
    </div>

    <div class="letter" onclick="openLetter(this,2)">
      <div class="paper">😁</div>
    </div>

    <div class="letter" onclick="openLetter(this,3)">
      <div class="paper">🫠</div>
    </div>

    <div class="letter" onclick="openLetter(this,4)">
      <div class="paper">😗</div>
    </div>

    <div class="letter" onclick="openLetter(this,5)">
      <div class="paper">🙈</div>
    </div>

  </div>

  <button onclick="show('final')">➡</button>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <span onclick="closePopup()">➡</span>
  <img id="photo">
  <p id="line"></p>
</div>

<!-- FINAL -->
<div id="final" class="page">
  <div class="flowers"></div>

  <div class="card">
    <h2>I love you forever 💖</h2>
  </div>

  <button onclick="show('page1')">➡</button>
</div>

<script>
const music = document.getElementById("music");

function start(){
  music.play();
  show('page2');
}

function show(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* LETTER OPEN */
function openLetter(el,n){

  let img=["img1.jpg","img2.jpg","img3.jpg","img4.jpg","img5.jpg"];
  let text=[
    "Aaayyy haaayyy 🫠💖",
    "He He He He 😁",
    "😽😽",
    "😳🕶️🤏🏻",
    "Love you 🙈💕"
  ];

  el.classList.add("open");

  setTimeout(()=>{
    el.querySelector(".paper").innerHTML =
      `<img src="${img[n-1]}">`;
  },400);

  setTimeout(()=>{
    document.getElementById("popup").style.display="block";
    document.getElementById("photo").src=img[n-1];
    document.getElementById("line").innerText=text[n-1];

    el.classList.remove("open");
    el.querySelector(".paper").innerHTML=text[n-1];

  },1000);
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

/* FLOWERS */
function createFlower(){
  const f=document.createElement("span");
  f.innerHTML="🌸";
  f.style.left=Math.random()*100+"vw";
  f.style.animationDuration=(Math.random()*3+2)+"s";
  document.querySelector(".flowers")?.appendChild(f);
  setTimeout(()=>f.remove(),5000);
}
setInterval(createFlower,300);
</script>

</body>
</html>
